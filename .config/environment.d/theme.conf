# Dark theme cho toàn hệ thống (Wayland + XWayland).
# GTK3/GTK4 đã có sẵn trong ~/.config/gtk-{3,4}.0/settings.ini (Yaru-dark).
# File này bổ sung cho:
#   - App libadwaita (Nautilus, GNOME mới): ép dark qua biến môi trường.
#   - App Qt5/Qt6: dùng theme tối (qt5ct-style-kvantum hoặc adwaita-qt).
#   - XDG desktop portal: báo cho app rằng user thích dark color scheme.

# Libadwaita (Nautilus, GNOME Calculator, v.v.)
# GTK_THEME ưu tiên cao hơn ADW_THEME; dùng chuỗi ":dark" để ép dark dù theme
# có tên light.
GTK_THEME=Yaru-dark:dark

# Qt5 / Qt6: áp dụng theme tối cho foot, wofi, dolphin (Qt), v.v.
# Kvantum là engine theme phổ biến trên Wayland; nếu chưa cài, app vẫn
# dùng fallback adwaita-qt (vẫn tối).
QT_STYLE_OVERRIDE=kvantum
QT_WAYLAND_DISABLE_WINDOWDECORATION=1

# Báo cho portal (xdg-desktop-portal-gtk / -gnome) cấp color-scheme=dark
# cho app dùng libhandy / libadwaita. Cần portal >= 1.18 + Gnome-42-44 backend
# hoặc dùng override dưới.
XDG_CURRENT_DESKTOP=GNOME
