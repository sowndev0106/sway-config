# Cấu hình GTK3 dùng chung cho mọi app GTK (Thunar, file-roller...).
# Sway không chạy xsettings daemon, nên app GTK đọc thẳng file này.
# gtk-application-prefer-dark-theme=1 -> ép giao diện TỐI (dark) cho Thunar.
[Settings]
gtk-theme-name=Yaru-dark
gtk-icon-theme-name=Papirus-Dark
gtk-cursor-theme-name=Yaru
gtk-application-prefer-dark-theme=1
gtk-font-name=JetBrains Mono 11
